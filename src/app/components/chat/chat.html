<div class="flex h-screen w-full bg-background animate-fade-in relative z-10">
  
  <aside class="w-72 bg-surface/40 backdrop-blur-xl border-r border-white/5 flex flex-col pt-8 pb-4">
    <div class="px-6 mb-8 flex items-center justify-between">
      <h2 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-accent to-primary">Movie Finder</h2>
    </div>
    
    <button (click)="startNewConversation()" class="mx-4 mb-6 bg-white/5 hover:bg-white/10 border border-white/10 text-zinc-300 rounded-xl px-4 py-3 text-sm font-semibold transition-colors shadow-sm flex items-center gap-2">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
      New Search
    </button>
    
    <div class="flex-1 overflow-y-auto px-4 space-y-2 no-scrollbar">
      <div *ngFor="let conv of conversations" 
           (click)="selectConversation(conv)"
           [class.bg-primary]="activeConversation?.id === conv.id"
           [class.text-white]="activeConversation?.id === conv.id"
           [class.bg-transparent]="activeConversation?.id !== conv.id"
           [class.text-zinc-400]="activeConversation?.id !== conv.id"
           class="px-4 py-3 rounded-xl cursor-pointer hover:bg-white/10 transition-colors text-sm truncate font-medium">
        {{ conv.title }}
      </div>
    </div>

    <div class="px-4 mt-auto">
      <button (click)="logout()" class="w-full flex items-center gap-2 justify-center py-3 text-sm font-medium text-zinc-500 hover:text-white transition-colors">
        Log out
      </button>
    </div>
  </aside>

  <main class="flex-1 flex flex-col min-w-0 bg-transparent relative">
    
    <div #chatScroll class="flex-1 overflow-y-auto p-6 md:p-10 space-y-8 no-scrollbar scroll-smooth">
      
      <div *ngIf="!activeConversation || activeConversation.messages.length === 0" class="h-full flex flex-col items-center justify-center text-center opacity-60">
        <div class="w-24 h-24 mb-6 rounded-full bg-primary/20 flex items-center justify-center mix-blend-screen">
          <svg class="w-12 h-12 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 4v16M17 4v16M3 8h4m10 0h4M3 12h18M3 16h4m10 0h4M4 20h16a1 1 0 001-1V5a1 1 0 00-1-1H4a1 1 0 00-1 1v14a1 1 0 001 1z"></path></svg>
        </div>
        <h3 class="text-xl font-bold text-white mb-2">Describe a scene or plot</h3>
        <p class="text-sm text-zinc-400 max-w-sm">"There's this movie where people go inside dreams to steal corporate secrets..."</p>
      </div>

      <ng-container *ngIf="activeConversation">
        <div *ngFor="let msg of activeConversation.messages" 
             [class.items-end]="msg.role === 'user'" 
             [class.items-start]="msg.role === 'ai'" 
             class="flex flex-col w-full animate-slide-up">
          
          <div [class.bg-primary]="msg.role === 'user'"
               [class.text-white]="msg.role === 'user'"
               [class.bg-surface]="msg.role === 'ai'"
               [class.text-zinc-200]="msg.role === 'ai'"
               [class.border-white/5]="msg.role === 'ai'"
               [class.rounded-br-none]="msg.role === 'user'"
               [class.rounded-bl-none]="msg.role === 'ai'"
               class="max-w-[85%] md:max-w-[75%] rounded-2xl p-5 border shadow-sm leading-relaxed whitespace-pre-wrap text-[15px]">
            
            <div *ngIf="msg.role === 'user'" [textContent]="msg.content"></div>
            <div *ngIf="msg.role === 'ai'" [innerHTML]="parseMarkdownToHtml(msg.content)"></div>
            
            <div *ngIf="msg.role === 'ai' && msg.id" class="mt-4 pt-3 border-t border-white/5 flex items-center justify-end gap-3">
              <span class="text-xs text-zinc-500 mr-2">Was this match accurate?</span>
              <button (click)="submitFeedback(msg.id, true)" class="text-zinc-400 hover:text-success transition-transform hover:scale-110">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 10h4.764a2 2 0 011.789 2.894l-3.5 7A2 2 0 0115.263 21h-4.017c-.163 0-.326-.02-.485-.06L7 20m7-10V5a2 2 0 00-2-2h-.095c-.5 0-.905.405-.905.905 0 .714-.211 1.412-.608 2.006L7 11v9m7-10h-2M7 20H5a2 2 0 01-2-2v-6a2 2 0 012-2h2.514"></path></svg>
              </button>
              <button (click)="submitFeedback(msg.id, false)" class="text-zinc-400 hover:text-error transition-transform hover:scale-110">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14H5.236a2 2 0 01-1.789-2.894l3.5-7A2 2 0 018.736 3h4.018a2 2 0 01.485.06l3.76.94m-7 10v5a2 2 0 002 2h.096c.5 0 .905-.405.905-.904 0-.715.211-1.413.608-2.008L17 13V4m-7 10h2m5-10h2a2 2 0 012 2v6a2 2 0 01-2 2h-2.514"></path></svg>
              </button>
            </div>
          </div>
        </div>

        <div *ngIf="loading" class="flex flex-col w-full items-start animate-slide-up">
           <div class="max-w-[85%] rounded-2xl rounded-bl-none p-5 bg-surface border border-white/5 shadow-sm flex items-center gap-2">
             <div class="flex gap-1">
               <div class="w-2 h-2 rounded-full bg-primary animate-bounce"></div>
               <div class="w-2 h-2 rounded-full bg-accent animate-bounce" style="animation-delay: 0.2s"></div>
               <div class="w-2 h-2 rounded-full bg-primary/50 animate-bounce" style="animation-delay: 0.4s"></div>
             </div>
             <span class="text-xs text-zinc-500 ml-2 font-medium tracking-wide">Agent is searching Qdrant & IMDB...</span>
           </div>
        </div>
      </ng-container>
      
    </div>

    <div class="p-6">
      <div class="max-w-4xl mx-auto relative bg-surface/80 backdrop-blur-md rounded-2xl border border-white/10 shadow-xl overflow-hidden ring-1 ring-white/5 focus-within:ring-primary/50 transition-all">
        <textarea [(ngModel)]="query" (keydown.enter)="sendMessage(); $event.preventDefault()" [disabled]="loading"
                  rows="2"
                  class="w-full bg-transparent text-zinc-100 placeholder:text-zinc-500 px-6 py-4 outline-none resize-none leading-relaxed" 
                  placeholder="Describe the movie plot..."></textarea>
        
        <div class="absolute right-3 bottom-3 flex items-center z-10">
          <button (click)="sendMessage()" [disabled]="!query.trim() || loading" 
                  class="bg-white/10 hover:bg-white/20 text-white rounded-xl p-2 transition-colors disabled:opacity-30 disabled:cursor-not-allowed">
            <svg class="w-5 h-5 -rotate-90 transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
          </button>
        </div>
      </div>
      <p class="text-center text-[10px] text-zinc-600 mt-3 mix-blend-screen">Movie Finder AI can make mistakes. Consider verifying metadata on IMDB.</p>
    </div>

  </main>
</div>
