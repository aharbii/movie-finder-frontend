<div class="movie-card" (click)="select()">
  <!-- Poster -->
  <div class="poster-wrapper">
    <img
      *ngIf="!posterError && poster"
      [src]="poster"
      [alt]="title"
      referrerpolicy="no-referrer"
      (error)="onPosterError()"
      class="poster-img"
    />
    <div *ngIf="posterError || !poster" class="poster-placeholder">
      <svg class="w-10 h-10 text-white/20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
          d="M7 4v16M17 4v16M3 8h4m10 0h4M3 12h18M3 16h4m10 0h4M4 20h16a1 1 0 001-1V5a1 1 0 00-1-1H4a1 1 0 00-1 1v14a1 1 0 001 1z"/>
      </svg>
      <span class="text-white/30 text-xs mt-2">No Poster</span>
    </div>
    <div class="poster-overlay">
      <span class="select-hint">This is the one</span>
    </div>
  </div>

  <!-- Info -->
  <div class="card-body">
    <div class="flex items-start justify-between gap-2 mb-1">
      <h3 class="card-title">{{ title }}</h3>
      <span *ngIf="year" class="year-badge">{{ year }}</span>
    </div>

    <div *ngIf="rating" class="rating-row">
      <span class="stars">{{ ratingStars }}</span>
      <span class="rating-value">{{ rating }}/10</span>
    </div>

    <p *ngIf="director" class="director">
      <span class="label">Dir.</span> {{ director }}
    </p>

    <p *ngIf="shortPlot" class="plot-excerpt">{{ shortPlot }}</p>

    <div *ngIf="actors.length" class="actors-row">
      <span *ngFor="let actor of actors.slice(0, 3)" class="actor-chip">{{ actor }}</span>
    </div>
  </div>
</div>
