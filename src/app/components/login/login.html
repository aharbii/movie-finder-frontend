<div class="w-full flex items-center justify-center p-6 animate-fade-in relative z-10">
  <div class="w-full max-w-sm rounded-2xl bg-surface/50 backdrop-blur-xl border border-white/10 shadow-2xl p-8 relative overflow-hidden">
    <!-- Inner subtle glow -->
    <div class="absolute -top-24 -right-24 w-48 h-48 bg-primary/30 blur-[60px] rounded-full"></div>

    <div class="relative z-10">
      <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-accent to-primary mb-2">Movie Finder</h1>
      <p class="text-zinc-400 text-sm mb-6">{{ isLoginMode ? 'Sign in to rediscover movies' : 'Create an account to begin' }}</p>

      <form [formGroup]="authForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
        <div>
          <label class="text-xs text-zinc-500 font-semibold mb-1 block uppercase tracking-wider">Email</label>
          <input formControlName="email" type="email" class="w-full bg-black/30 border border-white/5 rounded-xl px-4 py-3 text-zinc-100 placeholder:text-zinc-600 focus:outline-none focus:ring-2 focus:ring-primary/50 transition-all duration-300" placeholder="you@domain.com">
        </div>

        <div>
          <label class="text-xs text-zinc-500 font-semibold mb-1 block uppercase tracking-wider">Password</label>
          <input formControlName="password" type="password" class="w-full bg-black/30 border border-white/5 rounded-xl px-4 py-3 text-zinc-100 placeholder:text-zinc-600 focus:outline-none focus:ring-2 focus:ring-primary/50 transition-all duration-300" placeholder="••••••••">
        </div>

        <p *ngIf="error" class="text-error text-xs font-medium">{{ error }}</p>

        <button type="submit" [disabled]="authForm.invalid || loading" class="mt-2 w-full bg-gradient-to-r from-primary to-accent hover:from-primary/90 hover:to-accent/90 text-white rounded-xl px-4 py-3 font-semibold tracking-wide transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed transform active:scale-[0.98]">
          <span *ngIf="!loading">{{ isLoginMode ? 'Sign In' : 'Sign Up' }}</span>
          <span *ngIf="loading" class="flex justify-center items-center gap-2">
            <svg class="animate-spin h-5 w-5 text-white" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            Processing...
          </span>
        </button>

        <p class="text-center text-zinc-500 text-xs mt-4">
          {{ isLoginMode ? "Don't have an account?" : "Already have an account?" }} 
          <a href="javascript:void(0)" (click)="toggleMode()" class="text-accent hover:text-white transition-colors cursor-pointer font-bold">{{ isLoginMode ? 'Sign Up' : 'Sign In' }}</a>
        </p>
      </form>
    </div>
  </div>
</div>
