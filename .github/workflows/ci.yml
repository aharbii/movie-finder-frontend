# =============================================================================
# movie-finder-frontend — GitHub Actions CI
#
# Mirrors the Jenkins Multibranch pipeline 1:1.
# Both pipelines must remain in sync. Changes to build logic must be applied
# to both Jenkinsfile and this file.
#
# Pipeline: Lint · Typecheck · Test
#
# Image build and ACR push are NOT in this workflow.
# They are handled by the root aharbii/movie-finder GitHub Actions workflow
# after all submodule CI jobs pass, keeping build credentials out of
# submodule repositories.
#
# No required GitHub Actions secrets.
# =============================================================================

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ['v*']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # -------------------------------------------------------------------------- #
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize
        run: make init

      - name: Lint
        run: make lint

  # -------------------------------------------------------------------------- #
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize
        run: make init

      - name: Typecheck
        run: make typecheck

  # -------------------------------------------------------------------------- #
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize
        run: make init

      - name: Test with coverage
        run: make test-coverage

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: test-results/frontend-results.xml

      - name: Generate coverage summary
        if: always()
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage/cobertura-coverage.xml
          badge: true
          fail_below_min: false
          format: markdown
          hide_branch_rate: false
          hide_complexity: true
          indicators: true
          output: both
          thresholds: '10 80'

      - name: Post coverage comment
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          recreate: true
          path: code-coverage-results.md

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results/
            coverage/
